name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      GIT_TERMINAL_PROMPT: "0"
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - name: Configure git auth for private boogie repo
        if: github.event_name == 'pull_request'
        env:
          BOOGIE_REPO_TOKEN: ${{ secrets.BOOGIE_REPO_TOKEN }}
        run: |
          auth=$(printf 'x-access-token:%s' "$BOOGIE_REPO_TOKEN" | base64 | tr -d '\n')
          git config --global --unset-all credential.helper || true
          git config --global credential.helper ""
          git config --global http.https://github.com/asymptotic-code/boogie.git.extraheader "Authorization: Basic ${auth}"

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
